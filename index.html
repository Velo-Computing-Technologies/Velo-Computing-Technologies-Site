<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krytonum | Velo Computing Technologies</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg-color: #05070a;
            --card-bg: #0d1117;
            --accent-color: #00d2ff;
            --text-color: #e6edf3;
            --text-dim: #8b949e;
            --border: #30363d;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            margin: 0;
            line-height: 1.6;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        header {
            width: 100%;
            text-align: center;
            padding: 20px;
        }

        .logo-container img {
            max-width: 320px;
            height: auto;
            filter: drop-shadow(0 0 30px rgba(0, 210, 255, 0.3));
            margin-bottom: 20px;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            letter-spacing: -3px;
            margin: 0;
            background: linear-gradient(180deg, #fff 0%, #888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .slogan {
            font-family: 'JetBrains Mono', monospace;
            color: var(--accent-color);
            font-size: 1.1rem;
            margin-top: 10px;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .content {
            max-width: 700px;
            margin: 40px auto;
            text-align: center;
            padding: 0 20px;
        }

        .main-project {
            border-top: 1px solid var(--border);
            padding-top: 40px;
        }

        p {
            font-size: 1.2rem;
            color: var(--text-dim);
            max-width: 600px;
            margin: 0 auto 30px auto;
        }

        .status-box {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem;
            color: var(--accent-color);
            border: 1px solid var(--accent-color);
            padding: 8px 20px;
            display: inline-block;
            border-radius: 4px;
            text-transform: uppercase;
        }

        footer {
            position: absolute;
            bottom: 40px;
            width: 100%;
            text-align: center;
            color: #333;
            font-size: 0.75rem;
            font-family: 'JetBrains Mono', monospace;
        }
    </style>
</head>
<body>

<header>
    <div class="logo-container">
        <!-- Se till att filnamnet matchar din logotyp -->
        <img src="20260418_1701_Image Generation_simple_compose_01kpghr8rtfj6vcr1b3h88tn3k.png" alt="Krytonum Logo">
    </div>
    <h1>Krytonum</h1>
    <div class="slogan">The Core Standard</div>
</header>

<div class="content">
    <div class="main-project">
        <p>
            High-performance operating system architecture engineered for stability, 
            technical integrity, and bare-metal efficiency.
        </p>
        <div class="status-box">System Status: Active Development</div>
    </div>
</div>

<footer>
  © 2026 Velo Computing Technologies. All rights reserved.
</footer>

</body>
</html>
